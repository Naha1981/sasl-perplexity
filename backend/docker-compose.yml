version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=https://yourproject.supabase.co
      - SUPABASE_ANON_KEY=your_anon_key
      - AI_SERVICE_URL=http://sasl-model:8080/predict   # or your remote model URL
    depends_on:
      - sasl-model    # only if you self‑host the SASL model
    env_file:
      - .env

  # Optional: standalone SASL‑model service (you can remove this and point to a cloud API)
  sasl-model:
    image: your-sasl-model:latest
    ports:
      - "8080:8080"
    # volumes:
    #   - ./sasl_model:/app
    # command: ["uvicorn", "model:app", "--host", "0.0.0.0", "--port", "8080"]